[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests — no external dependencies
    integration: Integration tests — requires PostgreSQL test DB
    api: API tests — requires running Course Service and valid JWT
