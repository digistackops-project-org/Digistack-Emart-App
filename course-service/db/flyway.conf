# ============================================================
# course-service/db/flyway.conf
# Flyway configuration for coursedb PostgreSQL database.
#
# DB Team usage:
#   bash db/run-flyway.sh info      # Check migration status
#   bash db/run-flyway.sh migrate   # Apply pending migrations
#   bash db/run-flyway.sh validate  # Verify checksums
#   bash db/run-flyway.sh repair    # Fix failed migrations
# ============================================================

flyway.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:coursedb}
flyway.user=${DB_USER:emart_course}
flyway.password=${DB_PASSWORD}

flyway.locations=filesystem:db/migrations
flyway.table=flyway_schema_history
flyway.schemas=public

flyway.sqlMigrationPrefix=V
flyway.sqlMigrationSeparator=__
flyway.sqlMigrationSuffixes=.sql

flyway.validateOnMigrate=true
flyway.outOfOrder=false
flyway.loggers=console
