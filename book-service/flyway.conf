# ============================================================
# flyway.conf — Flyway configuration for Book Service
# Loaded by: flyway -configFiles=flyway.conf <command>
#
# Sensitive values (DB_URL, DB_USER, DB_PASSWORD) are read from
# environment variables at runtime using ${VAR} syntax.
# Override on CI: flyway -url=... -user=... -password=... migrate
# ============================================================

# JDBC connection — values injected from environment at runtime
flyway.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:booksdb}
flyway.user=${DB_USER:emart_books_user}
flyway.password=${DB_PASSWORD}

# Migration scripts location (relative to project root)
flyway.locations=filesystem:db/migration

# Naming convention: V{version}__{description}.sql
flyway.sqlMigrationPrefix=V
flyway.sqlMigrationSeparator=__
flyway.sqlMigrationSuffixes=.sql

# Schema history table
flyway.table=flyway_schema_history

# Target schema — Flyway will create it if absent
flyway.defaultSchema=public

# Allow migrations to run out of sequence (useful when merging branches)
flyway.outOfOrder=false

# Fail if a checksum mismatch is detected (prevents silent corruption)
flyway.validateOnMigrate=true

# Encoding
flyway.encoding=UTF-8

# ── Placeholders ─────────────────────────────────────────────
# Use ${placeholder} syntax in SQL files for dynamic values.
# Uncomment to enable:
# flyway.placeholderReplacement=true
# flyway.placeholders.schemaName=public
