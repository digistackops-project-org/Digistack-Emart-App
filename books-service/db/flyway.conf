# ============================================================
# db/flyway.conf
# Flyway configuration for booksdb PostgreSQL database.
#
# Usage:
#   flyway -configFiles=db/flyway.conf info
#   flyway -configFiles=db/flyway.conf migrate
#   flyway -configFiles=db/flyway.conf validate
#   flyway -configFiles=db/flyway.conf repair
#
# Override any value via environment variable: FLYWAY_<KEY>
#   e.g. FLYWAY_PASSWORD=secret flyway migrate
# ============================================================

# ── Connection ───────────────────────────────────────────────
flyway.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:booksdb}
flyway.user=${DB_USER:emart_books}
flyway.password=${DB_PASSWORD}

# ── Migration scripts location ───────────────────────────────
flyway.locations=filesystem:db/migrations

# ── Naming convention (Flyway default: V__description.sql) ───
flyway.sqlMigrationPrefix=V
flyway.sqlMigrationSeparator=__
flyway.sqlMigrationSuffixes=.sql

# ── Schema management ────────────────────────────────────────
# Flyway tracks migrations in flyway_schema_history table
flyway.table=flyway_schema_history
flyway.schemas=public

# ── Safety settings ──────────────────────────────────────────
# Prevents accidental migration on wrong database
flyway.validateOnMigrate=true

# If migration scripts are changed after applying, set to true
# to update checksums (use only in emergency)
flyway.outOfOrder=false

# Baseline if DB already has schema (use only on existing DBs)
# flyway.baselineOnMigrate=true
# flyway.baselineVersion=0

# ── Logging ──────────────────────────────────────────────────
flyway.loggers=console
