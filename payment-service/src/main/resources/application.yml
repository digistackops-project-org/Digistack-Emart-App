# ============================================================
# payment-service/src/main/resources/application.yml
# All sensitive values come from environment variables.
# Physical server: /etc/emart/payment.env (loaded by systemd EnvironmentFile)
# Kubernetes:      Secret emart-payment-secret
# ============================================================
spring:
  application:
    name: emart-payment-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:paymentdb}
    username: ${DB_USER:emart_payment}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: false

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns DDL — JPA only validates
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
    validate-on-migrate: true
    out-of-order: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${PORT:8084}
  error:
    include-message: on_param
    include-binding-errors: on_param

# ── JWT — MUST match login.env JWT_SECRET exactly ─────────────
app:
  jwt:
    secret: ${JWT_SECRET:}
    algorithm: HS256

  # Cart Service base URL — to clear cart after successful checkout
  cart-service:
    base-url: ${CART_SERVICE_URL:http://localhost:8081}

  # Payment simulation thresholds (no real gateway in this phase)
  payment:
    simulation-enabled: ${PAYMENT_SIMULATION:true}
    success-rate: ${PAYMENT_SUCCESS_RATE:0.95}   # 95% simulated success

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.emart.payment: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${JPA_LOG_SQL:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
